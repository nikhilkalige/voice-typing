# voicetype configuration
# Copy to ~/.config/voicetype/config.toml and edit as needed.

[ptt]
keysym = "t"        # X keysym name: "t", "F13", "space", …
mods   = "alt"      # comma-separated: "alt", "alt,ctrl", "" for bare key
toggle = false      # true = tap to start/stop; false = hold to talk

[engine]
language = "en"

[parakeet]
# Paths are auto-detected from the project directory if omitted.
# lib   = "/path/to/libparakeet.so"
# model = "/path/to/nemotron-3.5-asr-streaming-0.6b-q8_0.gguf"

[audio]
tail_ms = 120   # extra ms recorded after key release (catches trailing consonants)

[output]
notify      = true
dotool_pipe = "/tmp/dotool-pipe"
